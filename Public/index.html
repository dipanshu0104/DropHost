<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>dropHost - Easy File uploading</title>
  <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
</head>

<body>
  <!-- navbar code -->
  <div class="navbar">
    <h1>DropHost</h1>
    <img src="./images/github-6980894_1280.webp" alt="error">
  </div>

  <!-- Deop zone area code -->
  <div class="main">
    <section class="upload_container">
      <div class="drop-zone">
        <div class="icon-container">
          <img src="./images/file.svg" alt="file icon" class="center" draggable="false">
          <img src="./images/file.svg" alt="file icon" class="left" draggable="false">
          <img src="./images/file.svg" alt="file icon" class="right" draggable="false">
        </div>
        <input type="file" id="fileInput" multiple>
        <div class="title">Drop your files here or, <span class="browseBtn">browse</span> and <a
          href="http://localhost:8000">See</a></div>
        <button onclick="uploadFiles()" class="hidden" id="show">Upload</button>
      </div>


      <!-- Uploading process bar code -->
      <div class="pro">
        <p id="text" class="hidden">Uploading.....</p>
        <div id="progressText" class="hidden"> 0%</div>
      </div>


      <div id="progressContainer" class="hidden">
        <div id="progressBar"></div>
      </div>
    </section>

    <img src="./images/undraw-upload.svg" alt="error" class="backImage">
    <script src="script.js"></script>
  </div>
</body>

</html>
